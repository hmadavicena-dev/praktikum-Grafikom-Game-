<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Realm Slayer - Grafikom</title>
    <style>
        body{margin:0;overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif}
        canvas{display:block}
        #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
        #hp-box{position:absolute;top:20px;left:20px;background:rgba(0,0,0,0.7);padding:12px 16px;border-radius:8px;border:2px solid #333}
        #hp-label{color:#4ade80;font-size:14px;font-weight:bold;margin-bottom:4px}
        #hp-bar-bg{width:200px;height:16px;background:#1a1a1a;border-radius:8px;overflow:hidden}
        #hp-bar{width:100%;height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);transition:width 0.3s;border-radius:8px}
        #hp-text{color:#fff;font-size:11px;margin-top:4px}
        #wave-info{position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.7);padding:10px 16px;border-radius:8px;color:#fbbf24;font-weight:bold;border:2px solid #333}
        #boss-bar{position:absolute;top:60px;left:50%;transform:translateX(-50%);width:400px;background:rgba(0,0,0,0.8);padding:10px;border-radius:8px;border:2px solid #dc2626;display:none;text-align:center}
        #boss-name{color:#fbbf24;font-weight:bold;font-size:14px;margin-bottom:4px}
        #boss-hp-bg{width:100%;height:14px;background:#1a1a1a;border-radius:7px;overflow:hidden}
        #boss-hp{width:100%;height:100%;background:linear-gradient(90deg,#dc2626,#ef4444);transition:width 0.3s;border-radius:7px}
        #skills{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;pointer-events:auto}
        .skill{width:58px;height:58px;background:rgba(20,20,40,0.85);border:2px solid #555;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:0.2s;position:relative;overflow:hidden}
        .skill:hover{border-color:#fbbf24;transform:scale(1.08)}
        .skill-key{color:#ccc;font-size:10px;font-weight:bold}
        .skill-name{color:#fff;font-size:9px;margin-top:2px}
        .skill-cd-overlay{position:absolute;top:0;left:0;width:100%;background:rgba(0,0,0,0.55);pointer-events:none;transition:height 0.1s}
        .skill-cd-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:13px;font-weight:bold;pointer-events:none}
        #dmg-container{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
        .dmg{position:absolute;color:#fff;font-weight:bold;font-size:20px;text-shadow:0 0 6px #000,0 0 3px #000;animation:floatUp 1s forwards;pointer-events:none}
        @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1.2)}30%{transform:translateY(-15px) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(0.8)}}
        #crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
        #crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.5)}
        #crosshair::before{width:2px;height:20px;left:50%;top:50%;transform:translate(-50%,-50%)}
        #crosshair::after{width:20px;height:2px;left:50%;top:50%;transform:translate(-50%,-50%)}
        #message{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);color:#fbbf24;font-size:40px;font-weight:bold;text-shadow:0 0 30px rgba(251,191,36,0.5);display:none;text-align:center;pointer-events:none}
        #controls{position:absolute;bottom:88px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.35);font-size:11px;text-align:center;pointer-events:none}
        #heal-flash{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(74,222,128,0.15);pointer-events:none;display:none}
        #hit-flash{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,0.15);pointer-events:none;display:none}
    </style>
</head>
<body>
    <div id="ui">
        <div id="hp-box">
            <div id="hp-label">HERO HP</div>
            <div id="hp-bar-bg"><div id="hp-bar"></div></div>
            <div id="hp-text">150 / 150</div>
        </div>
        <div id="wave-info">Gelombang 1/5 | Kill: 0</div>
        <div id="boss-bar">
            <div id="boss-name">ABYSS DRAGON</div>
            <div id="boss-hp-bg"><div id="boss-hp"></div></div>
        </div>
        <div id="dmg-container"></div>
        <div id="crosshair"></div>
        <div id="message"></div>
        <div id="controls">WASD: Gerak | Mouse: Bidik | Klik: Tebas | 1: Api | 2: Es | 3: Petir | 4: Ultimate</div>
        <div id="skills">
            <div class="skill" onclick="useSkill(0)"><span class="skill-key">KLIK</span><span class="skill-name">Tebasan</span><div class="skill-cd-overlay" id="cd0"></div><div class="skill-cd-text" id="cdt0"></div></div>
            <div class="skill" onclick="useSkill(1)"><span class="skill-key">1</span><span class="skill-name">Api Biru</span><div class="skill-cd-overlay" id="cd1"></div><div class="skill-cd-text" id="cdt1"></div></div>
            <div class="skill" onclick="useSkill(2)"><span class="skill-key">2</span><span class="skill-name">Es Nova</span><div class="skill-cd-overlay" id="cd2"></div><div class="skill-cd-text" id="cdt2"></div></div>
            <div class="skill" onclick="useSkill(3)"><span class="skill-key">3</span><span class="skill-name">Petir</span><div class="skill-cd-overlay" id="cd3"></div><div class="skill-cd-text" id="cdt3"></div></div>
            <div class="skill" onclick="useSkill(4)"><span class="skill-key">4</span><span class="skill-name">Ultimate</span><div class="skill-cd-overlay" id="cd4"></div><div class="skill-cd-text" id="cdt4"></div></div>
        </div>
        <div id="heal-flash"></div>
        <div id="hit-flash"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    const scene=new THREE.Scene();
    scene.background=new THREE.Color(0x08080f);
    scene.fog=new THREE.FogExp2(0x08080f,0.02);

    const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,120);
    camera.position.set(0,20,18);

    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth,innerHeight);
    renderer.shadowMap.enabled=true;
    renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Pencahayaan
    scene.add(new THREE.AmbientLight(0x303050,0.5));
    const dirL=new THREE.DirectionalLight(0xffeedd,0.7);
    dirL.position.set(15,25,10);dirL.castShadow=true;
    dirL.shadow.mapSize.set(2048,2048);
    dirL.shadow.camera.near=1;dirL.shadow.camera.far=60;
    dirL.shadow.camera.left=-30;dirL.shadow.camera.right=30;
    dirL.shadow.camera.top=30;dirL.shadow.camera.bottom=-30;
    scene.add(dirL);
    const heroLight=new THREE.PointLight(0x4ade80,1.5,15);
    scene.add(heroLight);

    // Lantai
    const floorMat=new THREE.MeshStandardMaterial({color:0x12121e,roughness:0.9});
    const floor=new THREE.Mesh(new THREE.PlaneGeometry(60,60),floorMat);
    floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;
    scene.add(floor);
    scene.add(new THREE.GridHelper(60,60,0x222244,0x1a1a30));

    // Dinding pembatas (agar tidak keluar arena)
    const wallMat=new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:0.8,transparent:true,opacity:0.3});
    [[-25,0,0,0.5,3,50],[25,0,0,0.5,3,50],[0,0,-25,50,3,0.5],[0,0,25,50,3,0.5]].forEach(w=>{
        const m=new THREE.Mesh(new THREE.BoxGeometry(w[3],w[4],w[5]),wallMat);
        m.position.set(w[0],1.5,w[2]);scene.add(m);
    });

    // ================== STATE ==================
    let keys={},mouse=new THREE.Vector2(),raycaster=new THREE.Raycaster();
    let player,enemies=[],projectiles=[],effects=[],trailParts=[];
    let wave=1,kills=0,waveDelay=2,gameOver=false;
    let slashActive=false,slashTime=0;

    const PD={hp:150,maxHp:150,speed:0.18,skills:[
        {name:'Tebasan',dmg:16,cd:0.4,range:2.8,color:'#ffffff'},
        {name:'Api Biru',dmg:32,cd:2.5,range:0,color:'#00d4ff'},
        {name:'Es Nova',dmg:24,cd:4.5,range:5.5,color:'#7dd3fc'},
        {name:'Petir',dmg:48,cd:6.5,range:0,color:'#fbbf24'},
        {name:'Ultimate',dmg:75,cd:12,range:7.5,color:'#ef4444'}
    ]};
    let skillCds=[0,0,0,0,0];

    // ================== HERO ==================
    function createHero(){
        const g=new THREE.Group();
        // Badan
        const bodyMat=new THREE.MeshStandardMaterial({color:0x1e40af,roughness:0.5,metalness:0.2});
        const body=new THREE.Mesh(new THREE.BoxGeometry(0.9,1.3,0.6),bodyMat);
        body.position.y=1;body.castShadow=true;g.add(body);
        // Kepala
        const headMat=new THREE.MeshStandardMaterial({color:0x93c5fd,roughness:0.4});
        const head=new THREE.Mesh(new THREE.SphereGeometry(0.38,16,16),headMat);
        head.position.y=1.95;head.castShadow=true;g.add(head);
        // Baju zirah
        const armorMat=new THREE.MeshStandardMaterial({color:0x3b82f6,roughness:0.3,metalness:0.6});
        const armor=new THREE.Mesh(new THREE.BoxGeometry(1.0,0.4,0.7),armorMat);
        armor.position.y=1.3;armor.castShadow=true;g.add(armor);

        // PEDANG - Besar dan jelas
        const swordGroup=new THREE.Group();
        // Bilah pedang
        const bladeMat=new THREE.MeshStandardMaterial({color:0xe2e8f0,roughness:0.1,metalness:0.9,emissive:0x4488ff,emissiveIntensity:0.15});
        const blade=new THREE.Mesh(new THREE.BoxGeometry(0.12,2.0,0.05),bladeMat);
        blade.position.y=1.0;blade.castShadow=true;
        swordGroup.add(blade);
        // Ujung pedang (tajam)
        const tipMat=new THREE.MeshStandardMaterial({color:0xf0f0ff,roughness:0.05,metalness:1.0,emissive:0x4488ff,emissiveIntensity:0.3});
        const tip=new THREE.Mesh(new THREE.ConeGeometry(0.06,0.4,4),tipMat);
        tip.position.y=2.2;tip.rotation.y=Math.PI/4;
        swordGroup.add(tip);
        // Pegangan
        const hiltMat=new THREE.MeshStandardMaterial({color:0x92400e,roughness:0.7});
        const hilt=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.4,0.15),hiltMat);
        hilt.position.y=-0.1;swordGroup.add(hilt);
        // Garda (crossguard)
        const guardMat=new THREE.MeshStandardMaterial({color:0xfbbf24,roughness:0.3,metalness:0.8});
        const guard=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.08,0.12),guardMat);
        guard.position.y=0.1;swordGroup.add(guard);
        // Permata di garda
        const gemMat=new THREE.MeshStandardMaterial({color:0x4ade80,emissive:0x4ade80,emissiveIntensity:0.8});
        const gem=new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8),gemMat);
        gem.position.set(0,0.1,0.08);swordGroup.add(gem);

        swordGroup.position.set(0.7,1.0,0);
        swordGroup.rotation.z=-0.2;
        g.add(swordGroup);
        g.swordGroup=swordGroup;
        g.swordDefaultRot=-0.2;

        // Efek tebasan (arc mesh - awalnya tidak terlihat)
        const slashGeo=new THREE.TorusGeometry(2.0,0.08,4,32,Math.PI*0.7);
        const slashMat=new THREE.MeshBasicMaterial({color:0xccddff,transparent:true,opacity:0,side:THREE.DoubleSide});
        const slashMesh=new THREE.Mesh(slashGeo,slashMat);
        slashMesh.rotation.x=-Math.PI/2;
        slashMesh.position.y=1.0;
        slashMesh.visible=false;
        g.add(slashMesh);
        g.slashMesh=slashMesh;

        scene.add(g);
        return g;
    }

    // ================== MUSUH ==================
    function createEnemy(type){
        const g=new THREE.Group();
        let hp=40,speed=0.04,dmg=8,isBoss=false;

        if(type==='slime'){
            const mat=new THREE.MeshStandardMaterial({color:0x4ade80,roughness:0.6});
            const body=new THREE.Mesh(new THREE.SphereGeometry(0.6,16,12),mat);
            body.position.y=0.5;body.castShadow=true;g.add(body);
            const mat2=new THREE.MeshStandardMaterial({color:0x86efac,roughness:0.5});
            const top=new THREE.Mesh(new THREE.SphereGeometry(0.35,12,8),mat2);
            top.position.y=0.85;top.castShadow=true;g.add(top);
            hp=40;speed=0.04;
        }else if(type==='skeleton'){
            const mat=new THREE.MeshStandardMaterial({color:0xd4d4d8,roughness:0.6});
            const body=new THREE.Mesh(new THREE.BoxGeometry(0.5,1.0,0.3),mat);
            body.position.y=0.8;body.castShadow=true;g.add(body);
            const head=new THREE.Mesh(new THREE.BoxGeometry(0.45,0.45,0.4),mat);
            head.position.y=1.55;head.castShadow=true;g.add(head);
            const eyeMat=new THREE.MeshBasicMaterial({color:0xff4444});
            const e1=new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6),eyeMat);e1.position.set(-0.1,1.6,-0.2);g.add(e1);
            const e2=new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6),eyeMat);e2.position.set(0.1,1.6,-0.2);g.add(e2);
            hp=65;speed=0.065;
        }else if(type==='boss'){
            const bMat=new THREE.MeshStandardMaterial({color:0x991b1b,roughness:0.35,metalness:0.3});
            const body=new THREE.Mesh(new THREE.BoxGeometry(2.5,2.5,3.5),bMat);body.position.y=1.8;body.castShadow=true;g.add(body);
            const hMat=new THREE.MeshStandardMaterial({color:0xdc2626,roughness:0.25,metalness:0.4});
            const head=new THREE.Mesh(new THREE.SphereGeometry(1.2,16,16),hMat);head.position.set(0,2.8,-1.8);head.castShadow=true;g.add(head);
            // Mata
            const eyeM=new THREE.MeshBasicMaterial({color:0xfbbf24});
            const e1=new THREE.Mesh(new THREE.SphereGeometry(0.2,8,8),eyeM);e1.position.set(-0.4,3.0,-2.8);g.add(e1);
            const e2=new THREE.Mesh(new THREE.SphereGeometry(0.2,8,8),eyeM);e2.position.set(0.4,3.0,-2.8);g.add(e2);
            // Tanduk
            const hornM=new THREE.MeshStandardMaterial({color:0xfbbf24,metalness:0.7,roughness:0.3});
            const h1=new THREE.Mesh(new THREE.ConeGeometry(0.2,1.5,8),hornM);h1.position.set(-0.6,4.2,-1.8);h1.rotation.z=0.3;h1.rotation.x=-0.3;g.add(h1);
            const h2=new THREE.Mesh(new THREE.ConeGeometry(0.2,1.5,8),hornM);h2.position.set(0.6,4.2,-1.8);h2.rotation.z=-0.3;h2.rotation.x=-0.3;g.add(h2);
            // Sayap
            const wMat=new THREE.MeshStandardMaterial({color:0x7f1d1d,side:THREE.DoubleSide,roughness:0.5});
            const w1=new THREE.Mesh(new THREE.BoxGeometry(3.5,0.1,2.0),wMat);w1.position.set(-2.8,2.5,0);w1.rotation.z=0.4;g.add(w1);
            const w2=new THREE.Mesh(new THREE.BoxGeometry(3.5,0.1,2.0),wMat);w2.position.set(2.8,2.5,0);w2.rotation.z=-0.4;g.add(w2);
            // Ekor
            const tailM=new THREE.MeshStandardMaterial({color:0x7f1d1d,roughness:0.5});
            const tail=new THREE.Mesh(new THREE.ConeGeometry(0.3,3,8),tailM);tail.position.set(0,1.2,2.5);tail.rotation.x=0.8;g.add(tail);
            // Glow
            const glow=new THREE.PointLight(0xff2222,2,15);glow.position.set(0,2,0);g.add(glow);
            hp=700;speed=0.055;dmg=22;isBoss=true;
        }

        // Spawn posisi
        const s=Math.floor(Math.random()*4);
        if(s===0)g.position.set(-22,0,rnd(-18,18));
        else if(s===1)g.position.set(22,0,rnd(-18,18));
        else if(s===2)g.position.set(rnd(-18,18),0,-22);
        else g.position.set(rnd(-18,18),0,22);

        g.data={hp,maxHp:hp,speed,dmg,type,isBoss,atkCd:1.5,hitTimer:0};

        // HP bar sprite
        const cv=document.createElement('canvas');cv.width=128;cv.height=32;
        const cx=cv.getContext('2d');
        const tex=new THREE.CanvasTexture(cv);
        const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,depthTest:false}));
        sp.scale.set(isBoss?5:2.2,isBoss?1.2:0.5,1);
        sp.position.y=isBoss?5.5:2.2;
        g.add(sp);
        g.hpBar={ctx:cx,texture:tex};
        updateEnemyHP(g);

        scene.add(g);
        enemies.push(g);
    }

    function updateEnemyHP(e){
        const d=e.data;const c=e.hpBar.ctx;
        c.clearRect(0,0,128,32);
        c.fillStyle='#111';c.fillRect(0,0,128,32);
        const p=Math.max(0,d.hp/d.maxHp);
        c.fillStyle=d.isBoss?'#ef4444':(p>0.5?'#4ade80':'#fbbf24');
        c.fillRect(2,2,124*p,28);
        c.strokeStyle='rgba(255,255,255,0.3)';c.lineWidth=1;c.strokeRect(0,0,128,32);
        e.hpBar.texture.needsUpdate=true;
    }

    // ================== PROYEKTL SIHIR ==================
    function createMagicProjectile(pos,dir,color){
        const g=new THREE.Group();
        // Inti bola
        const coreMat=new THREE.MeshBasicMaterial({color:color});
        const core=new THREE.Mesh(new THREE.SphereGeometry(0.35,12,12),coreMat);
        g.add(core);
        // Lapisan luar (glow)
        const glowMat=new THREE.MeshBasicMaterial({color:color,transparent:true,opacity:0.3});
        const glow=new THREE.Mesh(new THREE.SphereGeometry(0.6,12,12),glowMat);
        g.add(glow);
        // Ring orbit
        const ringMat=new THREE.MeshBasicMaterial({color:color,transparent:true,opacity:0.5,side:THREE.DoubleSide});
        const ring=new THREE.Mesh(new THREE.TorusGeometry(0.5,0.04,8,24),ringMat);
        g.add(ring);
        g.ring=ring;
        // Cahaya
        const light=new THREE.PointLight(color,2,8);
        g.add(light);

        g.position.copy(pos);g.position.y=1.2;
        scene.add(g);
        projectiles.push({mesh:g,dir:dir.clone().normalize(),speed:0.35,life:2.5,isEnemy:false,colorHex:color,dmg:PD.skills[1].dmg});
    }

    // Proyektil musuh (Dark Mage)
    function createEnemyProjectile(pos,dir){
        const g=new THREE.Group();
        const core=new THREE.Mesh(new THREE.SphereGeometry(0.25,8,8),new THREE.MeshBasicMaterial({color:0xc084fc}));
        g.add(core);
        const glow=new THREE.Mesh(new THREE.SphereGeometry(0.45,8,8),new THREE.MeshBasicMaterial({color:0xc084fc,transparent:true,opacity:0.25}));
        g.add(glow);
        const light=new THREE.PointLight(0xc084fc,1,6);g.add(light);
        g.position.copy(pos);g.position.y=1;
        scene.add(g);
        projectiles.push({mesh:g,dir:dir.clone().normalize(),speed:0.2,life:3,isEnemy:true,colorHex:0xc084fc,dmg:12});
    }

    // ================== EFEK VISUAL ==================
    function createIceNova(pos,range){
        const g=new THREE.Group();
        // Cincin es
        const ringMat=new THREE.MeshBasicMaterial({color:0x7dd3fc,transparent:true,opacity:0.8,side:THREE.DoubleSide});
        const ring=new THREE.Mesh(new THREE.TorusGeometry(range,0.15,8,50),ringMat);
        ring.rotation.x=-Math.PI/2;ring.position.y=0.2;
        g.add(ring);
        // Partikel es (kotak kecil)
        for(let i=0;i<25;i++){
            const a=rnd(0,Math.PI*2);const r=rnd(1,range);
            const iceMat=new THREE.MeshBasicMaterial({color:0xa5f3fc,transparent:true,opacity:0.9});
            const ice=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.15,0.15),iceMat);
            ice.position.set(Math.cos(a)*r,rnd(0.2,2),Math.sin(a)*r);
            g.add(ice);
        }
        g.position.copy(pos);
        scene.add(g);
        effects.push({type:'icenova',obj:g,life:1.0,maxLife:1.0});
    }

    function createThunder(pos){
        const g=new THREE.Group();
        for(let i=0;i<6;i++){
            const mat=new THREE.MeshBasicMaterial({color:0xfbbf24,transparent:true,opacity:0.9});
            const bolt=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.12,16,6),mat);
            bolt.position.set(pos.x+rnd(-2,2),8,pos.z+rnd(-2,2));
            bolt.rotation.z=rnd(-0.3,0.3);
            g.add(bolt);
        }
        // Cahaya kilat
        const light=new THREE.PointLight(0xfbbf24,5,20);light.position.copy(pos);light.position.y=5;g.add(light);
        // Ledakan di tanah
        const flashMat=new THREE.MeshBasicMaterial({color:0xfbbf24,transparent:true,opacity:0.5,side:THREE.DoubleSide});
        const flash=new THREE.Mesh(new THREE.CircleGeometry(3,24),flashMat);
        flash.rotation.x=-Math.PI/2;flash.position.copy(pos);flash.position.y=0.1;
        g.add(flash);
        scene.add(g);
        effects.push({type:'thunder',obj:g,life:0.6,maxLife:0.6});
    }

    function createUltimateEffect(pos,range){
        const g=new THREE.Group();
        const mat=new THREE.MeshBasicMaterial({color:0xef4444,transparent:true,opacity:0.35,side:THREE.DoubleSide});
        const sphere=new THREE.Mesh(new THREE.SphereGeometry(range,32,32),mat);
        sphere.position.copy(pos);sphere.position.y=1.5;
        g.add(sphere);
        // Partikel api
        for(let i=0;i<30;i++){
            const a=rnd(0,Math.PI*2);const r=rnd(0.5,range);
            const fMat=new THREE.MeshBasicMaterial({color:Math.random()>0.5?0xef4444:0xfbbf24,transparent:true,opacity:0.8});
            const flame=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.5,0.2),fMat);
            flame.position.set(Math.cos(a)*r,rnd(0.3,3),Math.sin(a)*r);
            g.add(flame);
        }
        const light=new THREE.PointLight(0xef4444,4,20);light.position.copy(pos);light.position.y=3;g.add(light);
        scene.add(g);
        effects.push({type:'ultimate',obj:g,life:1.2,maxLife:1.2,range});
    }

    // ================== SKILL ==================
    function useSkill(idx){
        if(gameOver||skillCds[idx]>0)return;
        const sk=PD.skills[idx];
        skillCds[idx]=sk.cd;

        // Arah hadap mouse
        raycaster.setFromCamera(mouse,camera);
        const plane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
        const target=new THREE.Vector3();
        raycaster.ray.intersectPlane(plane,target);
        const dir=new THREE.Vector3().subVectors(target,player.position);dir.y=0;dir.normalize();
        player.rotation.y=Math.atan2(dir.x,dir.z);

        if(idx===0){ // Tebasan
            slashActive=true;slashTime=0.3;
            player.slashMesh.visible=true;
            player.slashMesh.material.opacity=0.9;
            player.slashMesh.rotation.z=player.rotation.y+Math.PI;
            // Rotasi pedang saat tebas
            player.swordGroup.rotation.z=-1.8;
            player.swordGroup.rotation.x=-0.5;

            enemies.forEach(e=>{
                if(e.position.distanceTo(player.position)<sk.range+1){
                    const aToE=Math.atan2(e.position.x-player.position.x,e.position.z-player.position.z);
                    const aP=player.rotation.y;
                    const da=Math.abs(normAngle(aToE-aP));
                    if(da<Math.PI*0.5) dealDamage(e,sk.dmg,'#ffffff');
                }
            });
        }else if(idx===1){ // Api Biru
            createMagicProjectile(player.position,dir,0x00d4ff);
        }else if(idx===2){ // Es Nova
            enemies.forEach(e=>{
                if(e.position.distanceTo(player.position)<sk.range) dealDamage(e,sk.dmg,'#7dd3fc');
            });
            createIceNova(player.position,sk.range);
        }else if(idx===3){ // Petir
            const tPos=target.clone();tPos.y=0;
            tPos.x=clamp(tPos.x,-22,22);tPos.z=clamp(tPos.z,-22,22);
            enemies.forEach(e=>{
                if(e.position.distanceTo(tPos)<3.5) dealDamage(e,sk.dmg,'#fbbf24');
            });
            createThunder(tPos);
        }else if(idx===4){ // Ultimate
            enemies.forEach(e=>{
                if(e.position.distanceTo(player.position)<sk.range) dealDamage(e,sk.dmg,'#ef4444');
            });
            createUltimateEffect(player.position,sk.range);
        }
    }

    // ================== DAMAGE ==================
    function dealDamage(enemy,amount,colorHex){
        const d=enemy.data;
        d.hp-=amount;d.hitTimer=0.25;

        // Angka damage di layar
        const pos=enemy.position.clone();pos.y+=1.5;
        pos.project(camera);
        const x=(pos.x*0.5+0.5)*innerWidth;
        const y=(-pos.y*0.5+0.5)*innerHeight;
        const el=document.createElement('div');
        el.className='dmg';el.style.left=x+'px';el.style.top=y+'px';
        el.style.color=colorHex;el.innerText='-'+amount;
        document.getElementById('dmg-container').appendChild(el);
        setTimeout(()=>el.remove(),1000);

        if(d.hp<=0){
            scene.remove(enemy);
            enemies=enemies.filter(e=>e!==enemy);
            kills++;
            // Drop heal 25% chance
            if(Math.random()<0.25){
                PD.hp=Math.min(PD.maxHp,PD.hp+20);
                flashEl('heal-flash');
            }
            if(d.isBoss){
                document.getElementById('boss-bar').style.display='none';
                showMessage("VICTORY!\nBoss Dikalahkan!",9999);
                gameOver=true;
            }
            updateUI();
        }else{
            updateEnemyHP(enemy);
        }
    }

    function hurtPlayer(dmg){
        if(gameOver)return;
        PD.hp-=dmg;
        flashEl('hit-flash');
        updateUI();
        if(PD.hp<=0){PD.hp=0;gameOver=true;showMessage("GAME OVER",9999);updateUI()}
    }

    function flashEl(id){const e=document.getElementById(id);e.style.display='block';setTimeout(()=>e.style.display='none',150)}

    function normAngle(a){while(a>Math.PI)a-=2*Math.PI;while(a<-Math.PI)a+=2*Math.PI;return a}
    function rnd(a,b){return a+Math.random()*(b-a)}
    function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
    function lerp(a,b,t){return a+(b-a)*t}

    function updateUI(){
        const p=Math.max(0,PD.hp/PD.maxHp);
        document.getElementById('hp-bar').style.width=(p*100)+'%';
        document.getElementById('hp-bar').style.background=p>0.5?'linear-gradient(90deg,#22c55e,#4ade80)':p>0.25?'linear-gradient(90deg,#eab308,#fbbf24)':'linear-gradient(90deg,#dc2626,#ef4444)';
        document.getElementById('hp-text').innerText=Math.ceil(PD.hp)+' / '+PD.maxHp;
        document.getElementById('wave-info').innerText='Gelombang '+wave+'/5 | Kill: '+kills;
        const boss=enemies.find(e=>e.data.isBoss);
        if(boss){
            document.getElementById('boss-hp').style.width=(Math.max(0,boss.data.hp/boss.data.maxHp)*100)+'%';
        }
    }

    function showMessage(t,d){const m=document.getElementById('message');m.innerText=t;m.style.display='block';if(d<9999)setTimeout(()=>m.style.display='none',d)}

    function spawnWave(){
        if(wave===1){for(let i=0;i<4;i++)createEnemy('slime')}
        else if(wave===2){for(let i=0;i<2;i++)createEnemy('slime');for(let i=0;i<2;i++)createEnemy('skeleton')}
        else if(wave===3){for(let i=0;i<3;i++)createEnemy('skeleton');createEnemy('slime')}
        else if(wave===4){for(let i=0;i<5;i++)createEnemy('skeleton')}
        else if(wave===5){createEnemy('boss');document.getElementById('boss-bar').style.display='block'}
        showMessage("Gelombang "+wave,2000);
    }

    // ================== INPUT ==================
    addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;
        if(e.key==='1')useSkill(1);if(e.key==='2')useSkill(2);if(e.key==='3')useSkill(3);if(e.key==='4')useSkill(4);
    });
    addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
    addEventListener('mousemove',e=>{mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1});
    addEventListener('mousedown',()=>{if(!gameOver)useSkill(0)});
    addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});

    // ================== GAME LOOP ==================
    const clock=new THREE.Clock();
    let autoAtk=0;

    function animate(){
        requestAnimationFrame(animate);
        const dt=Math.min(clock.getDelta(),0.05);

        if(!gameOver){
            // Gerak pemain (Translasi)
            const mv=new THREE.Vector3();
            if(keys['w']||keys['arrowup'])mv.z-=1;
            if(keys['s']||keys['arrowdown'])mv.z+=1;
            if(keys['a']||keys['arrowleft'])mv.x-=1;
            if(keys['d']||keys['arrowright'])mv.x+=1;
            if(mv.length()>0){mv.normalize().multiplyScalar(PD.speed);player.position.add(mv);
                player.position.x=clamp(player.position.x,-23,23);
                player.position.z=clamp(player.position.z,-23,23);
            }

            // Skill cooldown
            for(let i=0;i<5;i++){
                skillCds[i]=Math.max(0,skillCds[i]-dt);
                const cdEl=document.getElementById('cd'+i);
                const cdtEl=document.getElementById('cdt'+i);
                const pct=skillCds[i]/PD.skills[i].cd;
                cdEl.style.height=(pct*100)+'%';
                cdtEl.innerText=skillCds[i]>0?skillCds[i].toFixed(1):'';
            }

            // Animasi tebasan pedang
            if(slashActive){
                slashTime-=dt;
                player.swordGroup.rotation.z=lerp(player.swordGroup.rotation.z,player.swordDefaultRot,0.08);
                player.swordGroup.rotation.x=lerp(player.swordGroup.rotation.x,0,0.08);
                player.slashMesh.material.opacity=slashTime/0.3*0.8;
                if(slashTime<=0){
                    slashActive=false;
                    player.slashMesh.visible=false;
                    player.swordGroup.rotation.z=player.swordDefaultRot;
                    player.swordGroup.rotation.x=0;
                }
            }

            // Kamera mengikuti (Translasi)
            camera.position.x=lerp(camera.position.x,player.position.x,0.06);
            camera.position.z=lerp(camera.position.z,player.position.z+18,0.06);
            camera.lookAt(player.position.x,0,player.position.z);
            heroLight.position.set(player.position.x,3,player.position.z);

            // Update musuh
            enemies.forEach(e=>{
                const d=e.data;
                const dir=new THREE.Vector3().subVectors(player.position,e.position);dir.y=0;dir.normalize();
                e.position.add(dir.clone().multiplyScalar(d.speed));
                e.lookAt(player.position.x,0,player.position.z);

                // Animasi slime (Skala - bouncing)
                if(d.type==='slime'){
                    const s=1+Math.abs(Math.sin(Date.now()*0.006))*0.2;
                    e.children[0].scale.set(1,0.7+s*0.3,1);
                }
                // Animasi boss sayap (Rotasi)
                if(d.isBoss){
                    e.children[5].rotation.z=0.4+Math.sin(Date.now()*0.003)*0.15;
                    e.children[6].rotation.z=-0.4-Math.sin(Date.now()*0.003)*0.15;
                }

                // Hit flash
                if(d.hitTimer>0){
                    d.hitTimer-=dt;
                    e.children[0].material.emissive=new THREE.Color(0xffffff);
                    e.children[0].material.emissiveIntensity=2;
                }else if(e.children[0].material.emissiveIntensity>0){
                    e.children[0].material.emissive=new THREE.Color(0x000000);
                    e.children[0].material.emissiveIntensity=0;
                }

                // Serang pemain
                const hitRange=d.isBoss?2.5:1.3;
                if(e.position.distanceTo(player.position)<hitRange){
                    d.atkCd-=dt;
                    if(d.atkCd<=0){hurtPlayer(d.dmg);d.atkCd=d.isBoss?1.2:1.8}
                }
                // Boss ranged (napas api)
                if(d.isBoss&&e.position.distanceTo(player.position)<10&&e.position.distanceTo(player.position)>3){
                    d.atkCd-=dt;
                    if(d.atkCd<=0){createEnemyProjectile(e.position,dir);d.atkCd=2.5}
                }
            });

            // Update proyektil
            for(let i=projectiles.length-1;i>=0;i--){
                const p=projectiles[i];
                p.mesh.position.add(p.dir.clone().multiplyScalar(p.speed));
                p.life-=dt;
                // Rotasi ring pada proyektil sihir
                if(p.mesh.ring)p.mesh.ring.rotation.y+=0.15;

                // Trail partikel
                if(Math.random()<0.4){
                    const tMat=new THREE.MeshBasicMaterial({color:p.colorHex,transparent:true,opacity:0.6});
                    const tMesh=new THREE.Mesh(new THREE.SphereGeometry(0.1,4,4),tMat);
                    tMesh.position.copy(p.mesh.position);
                    scene.add(tMesh);
                    trailParts.push({mesh:tMesh,life:0.3});
                }

                if(p.isEnemy){
                    if(p.mesh.position.distanceTo(player.position)<1.2){
                        hurtPlayer(p.dmg);scene.remove(p.mesh);projectiles.splice(i,1);continue;
                    }
                }else{
                    let hit=false;
                    for(let j=enemies.length-1;j>=0;j--){
                        if(p.mesh.position.distanceTo(enemies[j].position)<1.5){
                            dealDamage(enemies[j],p.dmg,'#00d4ff');
                            scene.remove(p.mesh);projectiles.splice(i,1);hit=true;break;
                        }
                    }
                    if(hit)continue;
                }
                if(p.life<=0){scene.remove(p.mesh);projectiles.splice(i,1)}
            }

            // Update trail parts
            for(let i=trailParts.length-1;i>=0;i--){
                trailParts[i].life-=dt;
                trailParts[i].mesh.material.opacity=trailParts[i].life/0.3*0.5;
                trailParts[i].mesh.scale.multiplyScalar(0.95);
                if(trailParts[i].life<=0){scene.remove(trailParts[i].mesh);trailParts.splice(i,1)}
            }

            // Update efek visual
            for(let i=effects.length-1;i>=0;i--){
                const ef=effects[i];
                ef.life-=dt;
                const prog=1-ef.life/ef.maxLife;
                if(ef.type==='icenova'){
                    ef.obj.scale.set(1+prog*0.3,1,1+prog*0.3);
                    ef.obj.children.forEach(c=>{if(c.material)c.material.opacity=Math.max(0,(1-prog)*0.8)});
                }else if(ef.type==='thunder'){
                    ef.obj.children.forEach(c=>{if(c.material)c.material.opacity=Math.max(0,(1-prog))});
                }else if(ef.type==='ultimate'){
                    const s=1+prog*1.5;
                    ef.obj.scale.set(s,s,s);
                    ef.obj.children.forEach(c=>{if(c.material&&c.material.opacity!==undefined)c.material.opacity=Math.max(0,(1-prog)*0.35)});
                }
                if(ef.life<=0){scene.remove(ef.obj);effects.splice(i,1)}
            }

            // Cek gelombang selesai
            if(enemies.length===0&&wave<5){
                waveDelay-=dt;
                if(waveDelay<=0){wave++;waveDelay=2;spawnWave()}
            }
        }

        renderer.render(scene,camera);
    }

    // Mulai
    player=createHero();
    spawnWave();
    animate();
    </script>
</body>
</html>
